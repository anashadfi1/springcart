<section class="relative rounded-2xl overflow-hidden border border-slate-700/30 bg-[#0d1424]/60 animate-fade-in"
         style="font-family: 'DM Sans', sans-serif;">

  <!-- Background decoration -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-0 right-0 w-[500px] h-[300px] bg-blue-600/10 blur-[80px] rounded-full"></div>
    <div class="absolute bottom-0 left-0 w-[300px] h-[200px] bg-blue-900/15 blur-[60px] rounded-full"></div>
    <div class="absolute inset-0 opacity-[0.04]"
         style="background: repeating-linear-gradient(135deg, #3b82f6 0px, #3b82f6 1px, transparent 1px, transparent 40px);">
    </div>
    <!-- Horizontal accent lines -->
    <div class="absolute left-0 right-0 top-1/3 h-px bg-gradient-to-r from-transparent via-blue-500/10 to-transparent"></div>
    <div class="absolute left-0 right-0 top-2/3 h-px bg-gradient-to-r from-transparent via-blue-500/5 to-transparent"></div>
  </div>

  <div class="relative px-8 md:px-12 py-12 md:py-16 flex flex-col md:flex-row items-center gap-10">

    <!-- ── Left: Copy ── -->
    <div class="flex-1 min-w-0">
      <!-- Live badge -->
      <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full
                  bg-blue-500/10 border border-blue-500/20 text-blue-400
                  text-xs tracking-widest uppercase font-medium mb-6">
        <span class="w-1.5 h-1.5 rounded-full bg-blue-400 animate-pulse"></span>
        {{ badgeText }}
      </div>

      <!-- Headline -->
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-light text-white leading-tight mb-4"
          style="font-family: 'Rajdhani', sans-serif; letter-spacing: 0.05em;">
        {{ headlineLine1 }}<br/>
        <span class="text-blue-400">{{ headlineLine2 }}</span>
      </h1>

      <!-- Subtitle -->
      <p class="text-slate-500 text-sm md:text-base leading-relaxed max-w-lg mb-8">
        {{ subtitle }}
      </p>

      <!-- CTA row -->
      <div class="flex items-center gap-3 flex-wrap">
        <button (click)="onCtaClick()"
          class="relative inline-flex items-center gap-2.5 px-7 py-3.5 rounded-xl
                 bg-blue-600 hover:bg-blue-500 text-white
                 text-sm font-medium tracking-wider uppercase
                 shadow-lg shadow-blue-900/40
                 transition-all duration-200 overflow-hidden group">
          <div class="absolute inset-0 -translate-x-full group-hover:translate-x-full transition-transform duration-700
                      bg-gradient-to-r from-transparent via-white/10 to-transparent skew-x-12"></div>
          <span class="relative">{{ ctaLabel }}</span>
          <svg class="w-4 h-4 relative group-hover:translate-x-0.5 transition-transform duration-150"
               fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
          </svg>
        </button>
        <button (click)="onSecondaryClick()"
          class="inline-flex items-center gap-2 px-6 py-3.5 rounded-xl
                 border border-slate-700/60 hover:border-slate-600
                 text-slate-500 hover:text-slate-300
                 text-sm font-medium tracking-wider uppercase
                 transition-all duration-200">
          {{ secondaryLabel }}
        </button>
      </div>
    </div>

    <!-- ── Right: Stats ── -->
    <div class="flex md:flex-col gap-5 shrink-0">
      <div *ngFor="let stat of stats; let i = index"
           class="relative text-center md:text-right px-5 py-4 rounded-xl
                  bg-[#080c14]/50 border border-slate-700/30
                  hover:border-blue-500/20 transition-all duration-300"
           [style.animation-delay]="(i * 0.1 + 0.2) + 's'">
        <div class="text-2xl font-semibold text-blue-400 mb-0.5"
             style="font-family: 'Rajdhani', sans-serif;">
          {{ stat.value }}
        </div>
        <div class="text-[10px] text-slate-600 tracking-widest uppercase">{{ stat.label }}</div>
        <!-- Micro accent -->
        <div class="absolute bottom-0 left-1/2 -translate-x-1/2 md:left-auto md:translate-x-0 md:right-0
                    w-8 h-px bg-blue-500/30"></div>
      </div>
    </div>

  </div>

  <!-- Bottom shimmer border -->
  <div class="absolute bottom-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-blue-500/30 to-transparent"></div>
</section>

<style>
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-in { animation: fade-in 0.5s cubic-bezier(0.22, 1, 0.36, 1) both; }
</style>
