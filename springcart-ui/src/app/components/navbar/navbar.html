<!-- Google Fonts (include once in index.html in a real project) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

<header class="sticky top-0 z-50 border-b border-slate-700/30 backdrop-blur-xl bg-[#080c14]/85"
        style="font-family: 'DM Sans', sans-serif;">

  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between gap-4">

    <!-- ── Logo ── -->
    <a routerLink="/" class="flex items-center gap-3 shrink-0 group">
      <div class="relative">
        <div class="w-8 h-8 rounded-lg bg-blue-600/20 border border-blue-500/30 flex items-center justify-center
                    group-hover:bg-blue-600/30 group-hover:border-blue-500/50 transition-all duration-200">
          <svg class="w-4 h-4 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6z
                 M3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25z
                 M13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6z
                 M13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
          </svg>
        </div>
        <div class="absolute -inset-0.5 rounded-lg bg-blue-500/10 blur-sm opacity-0 group-hover:opacity-100 transition-opacity duration-200 -z-10"></div>
      </div>
      <span class="text-lg font-semibold tracking-[0.15em] uppercase text-white"
            style="font-family: 'Rajdhani', sans-serif;">
        Voltex
      </span>
    </a>

    <!-- ── Desktop Nav Links ── -->
    <nav class="hidden md:flex items-center gap-1">
      <a *ngFor="let link of navLinks"
         [routerLink]="link.path"
         routerLinkActive="text-blue-400 bg-blue-500/10"
         class="px-4 py-2 rounded-xl text-sm text-slate-500 hover:text-slate-300 hover:bg-slate-800/50
                transition-all duration-150 tracking-wide"
         [class.text-blue-400]="link.active"
         [class.bg-blue-500]="link.active">
        {{ link.label }}
      </a>
    </nav>

    <!-- ── Right Actions ── -->
    <div class="flex items-center gap-2.5 shrink-0">

      <!-- Search bar -->
      <div class="hidden lg:flex items-center gap-2 bg-[#0d1424] border border-slate-700/50 rounded-xl
                  px-3 py-2 w-52 focus-within:border-blue-500/50 focus-within:ring-1 focus-within:ring-blue-500/20
                  transition-all duration-200">
        <svg class="w-3.5 h-3.5 text-slate-600 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
        </svg>
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (ngModelChange)="onSearchChange($event)"
          placeholder="Search devices…"
          class="bg-transparent text-sm text-slate-300 placeholder-slate-600 focus:outline-none w-full"
        />
      </div>

      <!-- Wishlist -->
      <button class="relative w-9 h-9 rounded-xl bg-[#0d1424] border border-slate-700/50
                     hover:border-red-500/30 hover:bg-red-500/5
                     flex items-center justify-center transition-all duration-200 group">
        <svg class="w-4 h-4 text-slate-500 group-hover:text-red-400 transition-colors duration-150"
             fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
        </svg>
        <span *ngIf="wishlistCount > 0"
          class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center">
          {{ wishlistCount }}
        </span>
      </button>

      <!-- Cart -->
      <button class="relative w-9 h-9 rounded-xl bg-[#0d1424] border border-slate-700/50
                     hover:border-blue-500/40 hover:bg-blue-500/5
                     flex items-center justify-center transition-all duration-200 group">
        <svg class="w-4 h-4 text-slate-500 group-hover:text-blue-400 transition-colors duration-150"
             fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" />
        </svg>
        <span *ngIf="cartCount > 0"
          class="absolute -top-1 -right-1 w-4 h-4 bg-blue-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center">
          {{ cartCount }}
        </span>
      </button>

      <!-- Divider -->
      <div class="hidden sm:block w-px h-5 bg-slate-700/50"></div>

      <!-- Auth buttons -->
      <a routerLink="/login"
         class="hidden sm:inline-flex items-center text-xs font-medium tracking-widest uppercase
                px-4 py-2 rounded-xl border border-slate-700/60 hover:border-blue-500/40
                text-slate-500 hover:text-blue-400 transition-all duration-200">
        Sign In
      </a>
      <a routerLink="/register"
         class="hidden sm:inline-flex items-center gap-1.5 text-xs font-medium tracking-widest uppercase
                px-4 py-2 rounded-xl bg-blue-600 hover:bg-blue-500
                text-white shadow-lg shadow-blue-900/30
                transition-all duration-200 relative overflow-hidden group">
        <div class="absolute inset-0 -translate-x-full group-hover:translate-x-full transition-transform duration-500
                    bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
        <span class="relative">Register</span>
      </a>

      <!-- Mobile menu toggle -->
      <button (click)="toggleMobileMenu()"
              class="md:hidden w-9 h-9 rounded-xl bg-[#0d1424] border border-slate-700/50 flex items-center justify-center">
        <svg *ngIf="!mobileMenuOpen" class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
        <svg *ngIf="mobileMenuOpen" class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>

  <!-- ── Mobile Menu ── -->
  <div *ngIf="mobileMenuOpen"
       class="md:hidden border-t border-slate-700/30 bg-[#080c14]/95 backdrop-blur-xl px-6 py-4 space-y-1">
    <a *ngFor="let link of navLinks"
       [routerLink]="link.path"
       (click)="mobileMenuOpen = false"
       class="flex items-center px-4 py-2.5 rounded-xl text-sm text-slate-400 hover:text-white
              hover:bg-slate-800/50 transition-all duration-150 tracking-wide">
      {{ link.label }}
    </a>
    <div class="pt-3 flex gap-2 border-t border-slate-700/30 mt-3">
      <a routerLink="/login"
         class="flex-1 text-center text-xs tracking-widest uppercase py-2.5 rounded-xl
                border border-slate-700/60 text-slate-500 hover:text-blue-400 hover:border-blue-500/40 transition-all duration-200">
        Sign In
      </a>
      <a routerLink="/register"
         class="flex-1 text-center text-xs tracking-widest uppercase py-2.5 rounded-xl
                bg-blue-600 hover:bg-blue-500 text-white transition-all duration-200">
        Register
      </a>
    </div>
  </div>

</header>
