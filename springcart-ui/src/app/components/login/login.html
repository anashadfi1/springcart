<div class="min-h-screen bg-[#080c14] flex items-center justify-center px-4 relative overflow-hidden">

  <!-- Ambient background effects -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-[-20%] left-[-10%] w-[600px] h-[600px] rounded-full bg-blue-600/10 blur-[120px]"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[500px] h-[500px] rounded-full bg-blue-500/8 blur-[100px]"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] rounded-full bg-blue-900/5 blur-[140px]"></div>
    <!-- Grid pattern -->
    <div class="absolute inset-0 opacity-[0.03]"
      style="background-image: linear-gradient(#3b82f6 1px, transparent 1px), linear-gradient(to right, #3b82f6 1px, transparent 1px); background-size: 48px 48px;">
    </div>
  </div>

  <!-- Card -->
  <div class="relative w-full max-w-md animate-fade-in">

    <!-- Top accent bar -->
    <div class="h-px w-full bg-gradient-to-r from-transparent via-blue-500 to-transparent mb-8"></div>

    <!-- Logo / Brand area -->
    <div class="flex flex-col items-center mb-10">
      <div class="relative mb-4">
        <div class="w-14 h-14 rounded-2xl bg-blue-600/20 border border-blue-500/30 flex items-center justify-center backdrop-blur-sm shadow-lg shadow-blue-900/30">
          <svg class="w-7 h-7 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
          </svg>
        </div>
        <div class="absolute -inset-1 rounded-2xl bg-blue-500/10 blur-sm -z-10"></div>
      </div>
      <h1 class="text-2xl font-light tracking-[0.2em] text-white uppercase" style="font-family: 'Rajdhani', sans-serif;">
        Welcome Back
      </h1>
      <p class="text-slate-500 text-sm mt-1 tracking-wide">Sign in to your account</p>
    </div>

    <!-- Form card -->
    <div class="bg-[#0d1424]/80 backdrop-blur-xl border border-slate-700/40 rounded-2xl p-8 shadow-2xl shadow-black/40">

      <!-- Error message -->
      <div *ngIf="errorMessage"
        class="mb-6 px-4 py-3 rounded-xl bg-red-500/10 border border-red-500/30 flex items-start gap-3">
        <svg class="w-4 h-4 text-red-400 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
        </svg>
        <p class="text-red-400 text-sm leading-relaxed">{{ errorMessage }}</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">

        <!-- Email field -->
        <div class="group">
          <label for="email"
            class="block text-xs font-medium tracking-[0.12em] text-slate-400 uppercase mb-2">
            Email Address
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg class="w-4 h-4 text-slate-600 group-focus-within:text-blue-400 transition-colors duration-200"
                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
              </svg>
            </div>
            <input
              id="email"
              type="email"
              formControlName="email"
              placeholder="you@example.com"
              class="w-full bg-[#0a1120] border border-slate-700/60 rounded-xl pl-11 pr-4 py-3.5
                     text-slate-200 text-sm placeholder-slate-600
                     focus:outline-none focus:border-blue-500/70 focus:ring-1 focus:ring-blue-500/30 focus:bg-[#0c1628]
                     hover:border-slate-600/80
                     transition-all duration-200"
            />
          </div>
          <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
            class="mt-2 flex items-center gap-1.5">
            <div class="w-1 h-1 rounded-full bg-red-400"></div>
            <p class="text-red-400/80 text-xs">
              <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required</span>
              <span *ngIf="loginForm.get('email')?.errors?.['email']">Enter a valid email address</span>
            </p>
          </div>
        </div>

        <!-- Password field -->
        <div class="group">
          <div class="flex items-center justify-between mb-2">
            <label for="password"
              class="block text-xs font-medium tracking-[0.12em] text-slate-400 uppercase">
              Password
            </label>
            <a routerLink="/forgot-password"
              class="text-xs text-blue-400/80 hover:text-blue-300 transition-colors duration-150 tracking-wide">
              Forgot password?
            </a>
          </div>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg class="w-4 h-4 text-slate-600 group-focus-within:text-blue-400 transition-colors duration-200"
                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z" />
              </svg>
            </div>
            <input
              id="password"
              type="password"
              formControlName="password"
              placeholder="••••••••"
              class="w-full bg-[#0a1120] border border-slate-700/60 rounded-xl pl-11 pr-4 py-3.5
                     text-slate-200 text-sm placeholder-slate-600
                     focus:outline-none focus:border-blue-500/70 focus:ring-1 focus:ring-blue-500/30 focus:bg-[#0c1628]
                     hover:border-slate-600/80
                     transition-all duration-200"
            />
          </div>
          <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
            class="mt-2 flex items-center gap-1.5">
            <div class="w-1 h-1 rounded-full bg-red-400"></div>
            <p class="text-red-400/80 text-xs">
              <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required</span>
              <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Minimum 6 characters</span>
            </p>
          </div>
        </div>

        <!-- Submit button -->
        <div class="pt-2">
          <button
            type="submit"
            [disabled]="isLoading"
            class="relative w-full py-3.5 px-6 rounded-xl font-medium text-sm tracking-wider uppercase
                   bg-blue-600 hover:bg-blue-500
                   text-white
                   shadow-lg shadow-blue-900/40
                   focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:ring-offset-2 focus:ring-offset-[#0d1424]
                   disabled:opacity-60 disabled:cursor-not-allowed
                   transition-all duration-200 overflow-hidden group">

            <!-- Shimmer effect -->
            <div class="absolute inset-0 -translate-x-full group-hover:translate-x-full transition-transform duration-700 bg-gradient-to-r from-transparent via-white/10 to-transparent skew-x-12"></div>

            <!-- Content -->
            <span class="relative flex items-center justify-center gap-2.5">
              <svg *ngIf="isLoading" class="w-4 h-4 animate-spin text-blue-200" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              <span>{{ isLoading ? 'Authenticating...' : 'Sign In' }}</span>
              <svg *ngIf="!isLoading" class="w-4 h-4 text-blue-200 group-hover:translate-x-0.5 transition-transform duration-150"
                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
              </svg>
            </span>
          </button>
        </div>

      </form>
    </div>

    <!-- Register link -->
    <div class="mt-6 text-center">
      <p class="text-slate-600 text-sm">
        Don't have an account?
        <a routerLink="/signup"
          class="text-blue-400 hover:text-blue-300 ml-1 font-medium transition-colors duration-150 underline underline-offset-4 decoration-blue-500/30 hover:decoration-blue-400/60">
          Create one
        </a>
      </p>
    </div>

    <!-- Bottom accent bar -->
    <div class="h-px w-full bg-gradient-to-r from-transparent via-blue-500/30 to-transparent mt-8"></div>

  </div>
</div>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-in {
    animation: fade-in 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
</style>
