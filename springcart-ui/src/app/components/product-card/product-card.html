<article
  class="group relative bg-[#0d1424]/70 border border-slate-700/40 rounded-2xl overflow-hidden
         hover:border-blue-500/30 hover:shadow-xl hover:shadow-blue-900/20
         transition-all duration-300 cursor-pointer flex flex-col"
  style="font-family: 'DM Sans', sans-serif;"
  (click)="onCardClick()">

  <!-- ── Badge ── -->
  <div *ngIf="product.badge"
       class="absolute top-3 left-3 z-10 px-2.5 py-0.5 rounded-full text-[10px] font-semibold tracking-widest uppercase border"
       [ngClass]="{
         'bg-blue-500/20 border-blue-500/30 text-blue-400'   : product.badge === 'New',
         'bg-red-500/20  border-red-500/30  text-red-400'    : product.badge === 'Sale',
         'bg-amber-500/20 border-amber-500/30 text-amber-400': product.badge === 'Hot'
       }">
    {{ product.badge }}
  </div>

  <!-- ── Out of Stock overlay ── -->
  <div *ngIf="!product.inStock"
       class="absolute top-3 right-10 z-10 px-2.5 py-0.5 rounded-full text-[10px] font-semibold tracking-widest uppercase
              bg-slate-700/60 border border-slate-600/40 text-slate-500">
    Out of Stock
  </div>

  <!-- ── Wishlist button ── -->
  <button
    (click)="onWishlistToggle(); $event.stopPropagation()"
    class="absolute top-3 right-3 z-10 w-8 h-8 rounded-xl bg-[#080c14]/80 border border-slate-700/50
           hover:border-red-500/40 flex items-center justify-center
           transition-all duration-200 opacity-0 group-hover:opacity-100">
    <svg class="w-3.5 h-3.5 transition-all duration-150"
         [ngClass]="product.wishlisted ? 'text-red-400 fill-red-400' : 'text-slate-500 fill-none'"
         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
    </svg>
  </button>

  <!-- ── Image / Icon area ── -->
  <div class="relative h-48 bg-gradient-to-br from-[#0a1120] to-[#0d1930] flex items-center justify-center overflow-hidden shrink-0">
    <div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-500"
         style="background: radial-gradient(ellipse at center, rgba(59,130,246,0.09) 0%, transparent 70%);">
    </div>
    <!-- Icon -->
    <div class="relative z-10 transform group-hover:scale-110 transition-transform duration-500">
      <div class="w-20 h-20 rounded-2xl bg-blue-600/10 border border-blue-500/20 flex items-center justify-center
                  shadow-lg shadow-blue-900/20 group-hover:border-blue-500/35 group-hover:bg-blue-600/15
                  transition-all duration-300">
        <svg class="w-10 h-10 text-blue-400/60 group-hover:text-blue-400/80 transition-colors duration-300"
             fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
          <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="product.icon" />
        </svg>
      </div>
    </div>
    <!-- Brand watermark -->
    <span class="absolute bottom-3 right-3 text-[10px] tracking-widest uppercase text-slate-700 font-medium"
          style="font-family: 'Rajdhani', sans-serif;">
      {{ product.brand }}
    </span>
    <!-- Bottom shimmer -->
    <div class="absolute bottom-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-blue-500/15 to-transparent"></div>
  </div>

  <!-- ── Product Info ── -->
  <div class="p-5 flex flex-col flex-1">

    <!-- Name -->
    <div class="mb-2">
      <p class="text-[10px] text-slate-600 tracking-widest uppercase mb-1">{{ product.brand }}</p>
      <h3 class="text-sm font-medium text-slate-200 leading-snug group-hover:text-white transition-colors duration-150 line-clamp-2">
        {{ product.name }}
      </h3>
    </div>

    <!-- Star rating -->
    <div class="flex items-center gap-1.5 mb-3">
      <div class="flex items-center gap-0.5">
        <svg *ngFor="let s of [1,2,3,4,5]" class="w-3 h-3"
             [ngClass]="s <= product.rating ? 'text-amber-400' : 'text-slate-700'"
             fill="currentColor" viewBox="0 0 20 20">
          <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
        </svg>
      </div>
      <span class="text-[10px] text-slate-600">({{ product.reviews | number }})</span>
    </div>

    <!-- Spec chips -->
    <div class="flex flex-wrap gap-1.5 mb-4">
      <span *ngFor="let spec of product.specs.slice(0, 3)"
            class="px-2 py-0.5 rounded-md bg-slate-800/60 border border-slate-700/40 text-[10px] text-slate-500 tracking-wide">
        {{ spec }}
      </span>
    </div>

    <!-- Spacer pushes price to bottom -->
    <div class="flex-1"></div>

    <!-- Price + CTA -->
    <div class="flex items-end justify-between gap-2 mt-2">
      <div>
        <div class="flex items-baseline gap-2">
          <span class="text-lg font-semibold text-white" style="font-family: 'Rajdhani', sans-serif;">
            ${{ product.price | number:'1.2-2' }}
          </span>
          <span *ngIf="product.originalPrice" class="text-xs text-slate-600 line-through">
            ${{ product.originalPrice | number:'1.2-2' }}
          </span>
        </div>
        <span *ngIf="product.originalPrice" class="text-[10px] text-emerald-400 font-medium">
          Save ${{ (product.originalPrice - product.price) | number:'1.2-2' }}
        </span>
      </div>

      <button
        (click)="onAddToCart(); $event.stopPropagation()"
        [disabled]="!product.inStock"
        class="relative flex items-center gap-1.5 px-4 py-2 rounded-xl
               text-xs font-medium tracking-wide uppercase
               transition-all duration-200 overflow-hidden group/btn shrink-0
               disabled:opacity-40 disabled:cursor-not-allowed"
        [ngClass]="product.inStock
          ? 'bg-blue-600/20 border border-blue-500/30 hover:bg-blue-600 hover:border-blue-500 text-blue-400 hover:text-white'
          : 'bg-slate-800/40 border border-slate-700/30 text-slate-600'">
        <div class="absolute inset-0 -translate-x-full group-hover/btn:translate-x-full transition-transform duration-500
                    bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
        <svg class="w-3.5 h-3.5 relative" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" />
        </svg>
        <span class="relative">{{ product.inStock ? 'Add' : 'N/A' }}</span>
      </button>
    </div>
  </div>
</article>
